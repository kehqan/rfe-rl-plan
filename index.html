
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --os-bg: #e8e5e0;
    --bar-bg: rgba(248,246,242,0.88);
    --win-bg: #f7f5f0;
    --win-border: rgba(0,0,0,0.12);
    --win-title: #f2f0eb;
    --text-1: #1a1916;
    --text-2: #4a4945;
    --text-3: #8a8880;
    --rule: rgba(26,25,22,0.1);
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --teal: #0f6e56;
    --teal-bg: #e1f5ee;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --purple: #3c3489;
    --purple-bg: #eeedfe;
    --green: #3b6d11;
    --green-bg: #eaf3de;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'Instrument Sans', system-ui, sans-serif;
  }

  #os-root { width: 100%; height: 600px; background: var(--os-bg); position: relative; overflow: hidden; font-family: var(--sans); user-select: none; border-radius: 12px; }

  /* MENUBAR */
  #menubar { position: absolute; top:0; left:0; right:0; height: 28px; background: var(--bar-bg); backdrop-filter: blur(12px); border-bottom: 0.5px solid var(--win-border); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; z-index: 999; }
  .mb-left { display: flex; align-items: center; gap: 14px; }
  .mb-apple { width: 14px; height: 14px; background: var(--text-1); border-radius: 50%; flex-shrink:0; }
  .mb-item { font-size: 12px; color: var(--text-2); cursor: pointer; font-weight: 500; }
  .mb-item:hover { color: var(--text-1); }
  .mb-right { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-2); font-family: var(--mono); }

  /* WALLPAPER PATTERN */
  #wallpaper { position: absolute; inset:28px 0 52px; background: var(--os-bg); }
  #wallpaper::before { content:''; position:absolute; inset:0; background-image: radial-gradient(circle at 1px 1px, rgba(26,25,22,0.06) 1px, transparent 0); background-size: 24px 24px; }

  /* DESKTOP ICONS */
  .desk-icon { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background .12s; width: 76px; }
  .desk-icon:hover { background: rgba(26,25,22,0.07); }
  .desk-icon:active { background: rgba(26,25,22,0.12); }
  .desk-icon-img { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink:0; }
  .desk-icon-label { font-size: 11px; color: var(--text-1); text-align: center; line-height: 1.3; font-weight: 500; text-shadow: 0 1px 2px rgba(255,255,255,0.6); }

  /* DOCK */
  #dock { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(248,246,242,0.82); backdrop-filter: blur(16px); border: 0.5px solid var(--win-border); border-radius: 18px; padding: 8px 16px; display: flex; align-items: center; gap: 12px; z-index: 998; }
  .dock-item { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; transition: transform .15s; position: relative; flex-shrink:0; }
  .dock-item:hover { transform: scale(1.25) translateY(-4px); }
  .dock-item:active { transform: scale(1.1); }
  .dock-dot { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--text-2); display: none; }
  .dock-item.open .dock-dot { display: block; }
  .dock-sep { width: 0.5px; height: 32px; background: var(--win-border); margin: 0 4px; }

  /* WINDOWS */
  .win { position: absolute; background: var(--win-bg); border: 0.5px solid var(--win-border); border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.14), 0 1px 4px rgba(0,0,0,0.08); min-width: 300px; min-height: 200px; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
  .win.focused { z-index: 100; box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1); }
  .win-titlebar { height: 38px; background: var(--win-title); border-bottom: 0.5px solid var(--win-border); display: flex; align-items: center; padding: 0 12px; gap: 8px; cursor: grab; flex-shrink:0; }
  .win-titlebar:active { cursor: grabbing; }
  .win-btn { width: 12px; height: 12px; border-radius: 50%; flex-shrink:0; cursor: pointer; transition: filter .1s; }
  .win-btn:hover { filter: brightness(0.85); }
  .win-btn.close { background: #ff5f57; }
  .win-btn.min   { background: #ffbd2e; }
  .win-btn.max   { background: #28c840; }
  .win-btns { display: flex; gap: 6px; }
  .win-title-text { flex:1; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-2); margin-right: 42px; pointer-events: none; }
  .win-body { flex:1; overflow:auto; }

  /* SPOTLIGHT */
  #spotlight { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 420px; background: rgba(248,246,242,0.95); backdrop-filter: blur(20px); border: 0.5px solid var(--win-border); border-radius: 14px; box-shadow: 0 16px 56px rgba(0,0,0,0.22); z-index: 900; display: none; overflow: hidden; }
  #spotlight.show { display: block; }
  #spotlight-input { width: 100%; padding: 14px 16px; font-size: 15px; background: transparent; border: none; outline: none; color: var(--text-1); font-family: var(--sans); border-bottom: 0.5px solid var(--rule); }
  .sp-result { padding: 10px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 13px; color: var(--text-2); transition: background .1s; }
  .sp-result:hover, .sp-result.active { background: var(--blue-bg); color: var(--blue); }
  .sp-result-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink:0; }

  /* NOTIFICATION */
  #notif { position: absolute; top: 38px; right: 12px; width: 280px; background: rgba(248,246,242,0.95); border: 0.5px solid var(--win-border); border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,0.14); padding: 12px; z-index: 950; display: none; animation: slideIn .2s ease; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  #notif.show { display: block; }
  .notif-title { font-size: 12px; font-weight: 500; color: var(--text-1); margin-bottom: 3px; }
  .notif-body { font-size: 11px; color: var(--text-2); line-height: 1.5; }

  /* ======= APP CONTENT ======= */

  /* 90-DAY PLAN VIEWER */
  .plan-viewer { padding: 20px; }
  .plan-nav { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
  .plan-tab { padding: 5px 12px; font-size: 11px; font-family: var(--mono); border: 0.5px solid var(--rule); background: transparent; color: var(--text-2); cursor: pointer; border-radius: 4px; transition: all .12s; }
  .plan-tab:hover { background: var(--win-title); }
  .plan-tab.active { background: var(--text-1); color: var(--win-bg); border-color: var(--text-1); }
  .plan-content { font-size: 13px; color: var(--text-2); line-height: 1.7; }
  .plan-h { font-size: 16px; font-weight: 500; color: var(--text-1); margin-bottom: 10px; }
  .plan-phase { border: 0.5px solid var(--rule); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
  .plan-phase-tag { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: .07em; text-transform: uppercase; margin-bottom: 6px; }
  .plan-phase-name { font-size: 13px; font-weight: 500; color: var(--text-1); margin-bottom: 6px; }
  .plan-phase-item { font-size: 11px; color: var(--text-2); padding-left: 12px; position: relative; margin-bottom: 3px; }
  .plan-phase-item::before { content: '·'; position: absolute; left: 3px; color: var(--text-3); }

  /* NOTES */
  .notes-app { display: flex; height: 100%; }
  .notes-sidebar { width: 160px; background: var(--win-title); border-right: 0.5px solid var(--rule); padding: 12px 8px; flex-shrink:0; overflow-y:auto; }
  .notes-sidebar-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin: 0 6px 8px; }
  .note-item { padding: 7px 8px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; transition: background .1s; }
  .note-item:hover { background: var(--rule); }
  .note-item.selected { background: var(--blue); }
  .note-item.selected .ni-title { color: #fff; }
  .note-item.selected .ni-preview { color: rgba(255,255,255,0.7); }
  .ni-title { font-size: 12px; font-weight: 500; color: var(--text-1); margin-bottom: 1px; }
  .ni-preview { font-size: 10px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .notes-editor { flex:1; display: flex; flex-direction: column; }
  .notes-toolbar { padding: 8px 12px; border-bottom: 0.5px solid var(--rule); display: flex; gap: 8px; align-items: center; }
  .notes-tool-btn { padding: 3px 8px; font-size: 11px; border: 0.5px solid var(--rule); background: transparent; color: var(--text-2); border-radius: 4px; cursor: pointer; font-family: var(--mono); transition: background .1s; }
  .notes-tool-btn:hover { background: var(--win-title); }
  .note-editor-area { flex:1; padding: 16px; overflow-y: auto; }
  .note-editor-title { font-family: var(--serif); font-size: 22px; color: var(--text-1); border: none; background: transparent; outline: none; width: 100%; margin-bottom: 10px; }
  .note-editor-body { font-size: 13px; color: var(--text-2); border: none; background: transparent; outline: none; width: 100%; height: calc(100% - 56px); resize: none; line-height: 1.75; font-family: var(--sans); }
  .notes-add-btn { width: 28px; height: 28px; border: 0.5px solid var(--rule); background: transparent; color: var(--text-2); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-left: auto; transition: background .1s; }
  .notes-add-btn:hover { background: var(--win-title); }

  /* AI CHAT */
  .chat-app { display: flex; flex-direction: column; height: 100%; }
  .chat-messages { flex:1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .chat-msg { max-width: 85%; padding: 10px 13px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
  .chat-msg.user { align-self: flex-end; background: var(--text-1); color: var(--win-bg); border-radius: 12px 12px 3px 12px; }
  .chat-msg.assistant { align-self: flex-start; background: var(--win-title); color: var(--text-1); border: 0.5px solid var(--rule); border-radius: 12px 12px 12px 3px; }
  .chat-input-row { padding: 10px 12px; border-top: 0.5px solid var(--rule); display: flex; gap: 8px; align-items: flex-end; }
  .chat-input { flex:1; padding: 8px 12px; border: 0.5px solid var(--rule); border-radius: 20px; font-size: 13px; background: var(--win-title); color: var(--text-1); outline: none; font-family: var(--sans); resize: none; max-height: 80px; overflow-y: auto; }
  .chat-send { width: 32px; height: 32px; border-radius: 50%; background: var(--text-1); border: none; color: var(--win-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink:0; transition: opacity .12s; }
  .chat-send:disabled { opacity: .4; cursor: not-allowed; }
  .chat-system-prompt { padding: 8px 12px; background: var(--amber-bg); border-bottom: 0.5px solid var(--rule); font-size: 11px; color: var(--amber); display: flex; align-items: center; gap: 6px; font-family: var(--mono); }
  .chat-typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .chat-typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); animation: blink 1.2s infinite; }
  .chat-typing span:nth-child(2) { animation-delay: .2s; }
  .chat-typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,60%,100% { opacity:.3; } 30% { opacity:1; } }

  /* KANBAN */
  .kanban-app { padding: 12px; overflow-x: auto; height: 100%; }
  .kanban-board { display: flex; gap: 10px; height: 100%; min-width: fit-content; }
  .kanban-col { width: 180px; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
  .kanban-col-header { padding: 6px 8px; display: flex; align-items: center; justify-content: space-between; }
  .kanban-col-title { font-size: 11px; font-weight: 500; color: var(--text-2); font-family: var(--mono); text-transform: uppercase; letter-spacing: .06em; }
  .kanban-col-count { font-family: var(--mono); font-size: 10px; background: var(--rule); color: var(--text-3); padding: 1px 6px; border-radius: 10px; }
  .kanban-cards { flex:1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .k-card { background: var(--win-bg); border: 0.5px solid var(--rule); border-radius: 8px; padding: 10px; cursor: pointer; transition: box-shadow .12s; }
  .k-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .k-card-title { font-size: 12px; font-weight: 500; color: var(--text-1); margin-bottom: 5px; line-height: 1.4; }
  .k-card-tag { display: inline-block; font-family: var(--mono); font-size: 9px; font-weight: 500; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .k-card-meta { font-size: 10px; color: var(--text-3); margin-top: 5px; font-family: var(--mono); }
  .kanban-add { padding: 6px 8px; font-size: 11px; color: var(--text-3); border: 0.5px dashed var(--rule); border-radius: 6px; cursor: pointer; text-align: center; transition: all .12s; }
  .kanban-add:hover { background: var(--win-title); color: var(--text-2); }

  /* FILES */
  .files-app { display: flex; height: 100%; }
  .files-sidebar { width: 140px; background: var(--win-title); border-right: 0.5px solid var(--rule); padding: 12px 8px; flex-shrink:0; }
  .files-sidebar-section { margin-bottom: 16px; }
  .files-sidebar-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-3); margin: 0 6px 6px; display: block; }
  .files-sidebar-item { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 5px; cursor: pointer; font-size: 12px; color: var(--text-2); transition: background .1s; margin-bottom: 1px; }
  .files-sidebar-item:hover { background: var(--rule); }
  .files-sidebar-item.active { background: var(--blue); color: #fff; }
  .files-sidebar-icon { font-size: 13px; flex-shrink:0; }
  .files-main { flex:1; padding: 12px; overflow-y: auto; }
  .files-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .files-search { flex:1; padding: 6px 10px; border: 0.5px solid var(--rule); border-radius: 6px; font-size: 12px; background: var(--win-title); color: var(--text-1); outline: none; font-family: var(--sans); }
  .files-view-btn { width: 26px; height: 26px; border: 0.5px solid var(--rule); border-radius: 5px; background: transparent; cursor: pointer; color: var(--text-2); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: background .1s; }
  .files-view-btn:hover { background: var(--win-title); }
  .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
  .file-item { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 6px; border-radius: 8px; cursor: pointer; transition: background .12s; border: 0.5px solid transparent; }
  .file-item:hover { background: var(--win-title); }
  .file-item.selected { background: var(--blue-bg); border-color: var(--blue); }
  .file-icon { width: 44px; height: 52px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; border: 0.5px solid var(--rule); background: white; }
  .file-ext { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 8px; font-weight: 500; color: white; padding: 1px 4px; border-radius: 2px; }
  .file-name { font-size: 10px; color: var(--text-1); text-align: center; line-height: 1.3; word-break: break-word; }

  /* UTILS */
  .tag-blue { background: var(--blue-bg); color: var(--blue); }
  .tag-teal { background: var(--teal-bg); color: var(--teal); }
  .tag-amber { background: var(--amber-bg); color: var(--amber); }
  .tag-purple { background: var(--purple-bg); color: var(--purple); }
  .tag-green { background: var(--green-bg); color: var(--green); }
  .tag-red { background: var(--red-bg); color: var(--red); }
</style>

<script>
const ROOT = document.getElementById('os-root');
const openWindows = {};
let zTop = 10;

function tick() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('mb-time').textContent = h + ':' + m;
}
tick(); setInterval(tick, 10000);

function notify(title, body) {
  const n = document.getElementById('notif');
  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-body').textContent = body;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3500);
}

setTimeout(() => notify('Sandbox OS', 'Welcome back. Your workspace is ready.'), 600);

/* ── WINDOW MANAGER ── */
function createWindow(id, title, w, h, x, y, content) {
  if (openWindows[id]) { focusWin(id); return; }
  const win = document.createElement('div');
  win.className = 'win focused';
  win.id = 'win-' + id;
  win.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;`;
  win.innerHTML = `
    <div class="win-titlebar" id="tb-${id}">
      <div class="win-btns">
        <div class="win-btn close" onclick="closeWin('${id}')"></div>
        <div class="win-btn min"   onclick="minimizeWin('${id}')"></div>
        <div class="win-btn max"   onclick="maximizeWin('${id}')"></div>
      </div>
      <div class="win-title-text">${title}</div>
    </div>
    <div class="win-body" id="wb-${id}">${content}</div>`;
  ROOT.appendChild(win);
  openWindows[id] = { el: win, min: false, maxed: false, origStyle: '' };
  focusWin(id);
  document.getElementById('dock-' + id)?.classList.add('open');
  makeDraggable(win, document.getElementById('tb-' + id));
  postCreate(id);
}

function focusWin(id) {
  Object.values(openWindows).forEach(w => w.el.classList.remove('focused'));
  if (openWindows[id]) { openWindows[id].el.classList.add('focused'); openWindows[id].el.style.zIndex = ++zTop; }
}

function closeWin(id) {
  const w = openWindows[id]; if (!w) return;
  w.el.style.opacity = '0'; w.el.style.transform = 'scale(0.92)'; w.el.style.transition = 'all .15s';
  setTimeout(() => { w.el.remove(); delete openWindows[id]; document.getElementById('dock-'+id)?.classList.remove('open'); }, 160);
}

function minimizeWin(id) {
  const w = openWindows[id]; if (!w) return;
  w.el.style.display = 'none'; w.min = true;
}

function maximizeWin(id) {
  const w = openWindows[id]; if (!w) return;
  if (w.maxed) {
    w.el.style.cssText = w.origStyle; w.maxed = false;
  } else {
    w.origStyle = w.el.style.cssText;
    w.el.style.cssText = 'left:0;top:28px;width:100%;height:calc(100% - 80px);z-index:' + (++zTop) + ';';
    w.maxed = true;
  }
}

function makeDraggable(win, handle) {
  let sx, sy, ox, oy;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    sx = e.clientX; sy = e.clientY;
    ox = parseInt(win.style.left)||0; oy = parseInt(win.style.top)||0;
    focusWin(win.id.replace('win-',''));
    function move(e) {
      win.style.left = Math.max(0, ox + e.clientX - sx) + 'px';
      win.style.top  = Math.max(28, oy + e.clientY - sy) + 'px';
    }
    function up() { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

/* ── APP LAUNCHER ── */
function openApp(id) {
  if (openWindows[id]) {
    if (openWindows[id].min) { openWindows[id].el.style.display = ''; openWindows[id].min = false; }

  const [title, w, h, x, y, content] = configs[id];

}

const chatHistory = [
  {role:'assistant', content:'Hi! I\'m your AI playground. Ask me anything about your 90-day plan, newsroom AI strategy, prompt design, or just brainstorm freely.'}

function buildChat() {
  return `<div class="chat-app">
    <div class="chat-system-prompt">⚡ Connected to Claude API · Newsroom AI mode</div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input-row">

      <button class="chat-send" id="chat-send-btn" onclick="sendChat()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l10-5-5 10-1.5-4.5L2 7z" fill="white"/></svg>
      </button>
    </div>
  </div>`;
}
function initChat() { renderChat(); }
function renderChat() {
  const el = document.getElementById('chat-msgs'); if (!el) return;
  el.innerHTML = chatHistory.map(m => `<div class="chat-msg ${m.role}">${m.content}</div>`).join('');
  el.scrollTop = el.scrollHeight;
}
function chatKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }
async function sendChat() {
  const inp = document.getElementById('chat-input'); if (!inp) return;
  const msg = inp.value.trim(); if (!msg) return;
  inp.value = ''; inp.style.height = '';
  chatHistory.push({role:'user', content: msg});
  renderChat();
  const btn = document.getElementById('chat-send-btn');
  if (btn) btn.disabled = true;
  const msgs = document.getElementById('chat-msgs');
  const typing = document.createElement('div');
  typing.className = 'chat-msg assistant';
  typing.innerHTML = '<div class="chat-typing"><span></span><span></span><span></span></div>';
  if (msgs) msgs.appendChild(typing);
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'You are a helpful AI assistant embedded in a personal Sandbox OS for a Creative AI Specialist at RFE/RL Prague. You help with newsroom AI strategy, workflow design, prompt engineering, brainstorming, and general questions. Keep responses concise and practical. You are aware of their 90-day action plan focused on human-in-the-loop AI assistance for journalists.',
        messages: chatHistory.map(m => ({role:m.role, content:m.content}))
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b => b.type === 'text')?.text || 'No response.';
    typing.remove();
    chatHistory.push({role:'assistant', content: reply});
    renderChat();
  } catch(e) {
    typing.remove();
    chatHistory.push({role:'assistant', content:'Connection error. Check API access.'});
    renderChat();
  }
  if (btn) btn.disabled = false;
  const i = document.getElementById('chat-input'); if (i) i.focus();
}

      </div>
      <div class="files-grid">
        ${filesData.map((f,i) => `
          <div class="file-item" onclick="selectFile(${i})" id="fi-${i}">
            <div class="file-icon"><span style="font-size:22px">${f.icon}</span><span class="file-ext" style="background:${f.color}">${f.ext}</span></div>
            <div class="file-name">${f.name}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function selectFile(i) {
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('fi-' + i); if (el) el.classList.add('selected');
  selFile = i;
  if (filesData[i].name === 'index.html') { notify('Files', 'Double-click to open 90-Day Plan viewer'); }
}

window.addEventListener('click', e => {
  const sp = document.getElementById('spotlight');
  if (sp.classList.contains('show') && !sp.contains(e.target) && e.target.id !== 'btn-spotlight') {
    sp.classList.remove('show');
  }
});
</script>
